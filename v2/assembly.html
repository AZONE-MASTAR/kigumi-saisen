<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ki-gu-mi 賽銭貯金箱 — 組み上がる体験</title>
<meta name="description" content="バラバラの木組みパーツが、ボタンひとつで一台の賽銭貯金箱へ組み上がっていく体験。ki-gu-mi・大分自社工場の手仕事を3Dで。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Zen+Old+Mincho:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#efe9dc; --wash:#f6f1e7; --panel:#fffdf8; --ink:#2a251d; --muted:#7c7261; --line:#e0d8c6;
    --accent:#5c7d4c; --accent-d:#456039; --gold:#a9812f; --take:#c9a75f;
    --mincho:"Shippori Mincho B1",serif; --old:"Zen Old Mincho",serif; --sans:"Zen Kaku Gothic New",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
  /* 全画面固定ビューア。カメラ操作はOrbitControls（ドラッグ回転・ホイール/ピンチズーム）に全面委任 */
  #app{position:fixed;inset:0;z-index:1}
  #app canvas{display:block;cursor:grab}
  #app canvas:active{cursor:grabbing}

  #hdr{position:fixed;top:14px;left:16px;right:16px;z-index:35;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:8px 12px;pointer-events:none}
  #hdr>*{pointer-events:auto}
  #brand{font-family:var(--mincho);font-weight:700;font-size:18px;letter-spacing:.08em;color:var(--ink)}
  #brand .en{font-family:var(--sans);font-weight:500;font-size:10.5px;letter-spacing:.18em;color:var(--muted);display:block;margin-top:1px}
  #madein{display:flex;gap:7px;align-items:center;font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:30px;padding:6px 13px;white-space:nowrap}
  #madein b{color:var(--accent-d)}
  .dotjp{width:9px;height:9px;border-radius:50%;background:#bc002d;flex:none}

  /* loader */
  #loader{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(120% 100% at 50% 20%,#f6f1e7,#e6ddc9)}
  #loader .ring{width:44px;height:44px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loader .t{margin-top:16px;font-family:var(--mincho);font-size:15px;letter-spacing:.08em;color:var(--muted)}

  /* progress rail */
  #rail{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold));z-index:36;width:0%;transition:width .05s linear}

  /* play button（画面下中央） */
  #playWrap{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:26;display:flex;flex-direction:column;align-items:center;gap:9px;opacity:0;transition:opacity .5s;pointer-events:none}
  #playWrap.show{opacity:1}
  #playWrap.show #playBtn{pointer-events:auto}
  #playBtn{display:inline-flex;align-items:center;gap:10px;font-family:var(--sans);font-weight:700;font-size:16px;letter-spacing:.04em;color:#fff;
    background:var(--accent);border:none;border-radius:36px;padding:16px 34px;min-height:52px;cursor:pointer;
    box-shadow:0 14px 34px rgba(92,125,76,.4);transition:transform .15s,box-shadow .15s,background .2s}
  #playBtn:hover:not(:disabled){transform:translateY(-2px)}
  #playBtn:active:not(:disabled){transform:translateY(0)}
  #playBtn:disabled{background:#9aa78f;cursor:default;box-shadow:0 8px 20px rgba(92,125,76,.2)}
  #ctrlhint{font-size:11px;letter-spacing:.06em;color:var(--muted);background:rgba(255,253,248,.7);border:1px solid var(--line);border-radius:20px;padding:5px 13px;white-space:nowrap}

  /* caption */
  #caption{position:fixed;left:50%;bottom:118px;transform:translateX(-50%);z-index:24;width:min(560px,92vw);text-align:center;pointer-events:none}
  #caption .line{position:absolute;left:0;right:0;top:0;opacity:0;transition:opacity .6s ease;font-family:var(--mincho);font-weight:700;font-size:clamp(17px,3vw,25px);color:var(--ink);letter-spacing:.03em;text-shadow:0 2px 18px rgba(255,253,248,.9),0 0 4px rgba(255,253,248,.7)}
  #caption .line.on{opacity:1;position:relative}
  #caption .line:not(.on){position:absolute}
  #ctaWrap{margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;opacity:0;transform:translateY(10px);transition:opacity .5s ease,transform .5s ease;pointer-events:none}
  #ctaWrap.show{opacity:1;transform:translateY(0);pointer-events:auto}
  .ctabtn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;text-decoration:none;padding:13px 22px;border-radius:30px;transition:transform .15s,box-shadow .15s;font-family:var(--sans);border:none;cursor:pointer}
  .ctabtn.main{background:var(--accent);color:#fff;box-shadow:0 12px 28px rgba(92,125,76,.34)}
  .ctabtn.main:hover{transform:translateY(-2px)}

  @media(max-width:700px){
    #brand{font-size:14.5px}
    #brand .en{font-size:9px;letter-spacing:.1em}
    #madein{font-size:9.5px;padding:5px 10px;gap:5px}
    #caption{bottom:108px;width:94vw}
    #caption .line{font-size:clamp(14.5px,4vw,19px)}
    .ctabtn{font-size:12.5px;padding:11px 17px}
    #playWrap{bottom:16px}
    #playBtn{font-size:15px;padding:15px 30px;min-height:50px}   /* タップしやすいサイズを維持 */
  }
</style>

<body>
<div id="app"></div>
<div id="rail"></div>

<div id="hdr">
  <div id="brand">ki-gu-mi 賽銭貯金箱<span class="en"><a href="experience.html" style="color:var(--accent-d);text-decoration:none">← カスタム</a>　·　<a href="index.html" style="color:var(--muted);text-decoration:none">ホーム</a></span></div>
  <div id="madein"><span class="dotjp"></span><b>MADE IN JAPAN</b>／大分・自社工場</div>

<div id="loader"><div class="ring"></div><div class="t" id="lt">竹を削り出しています…</div></div>

<div id="caption">
  <div style="position:relative;height:1.6em">
    <div class="line" data-i="0">バラバラのパーツが、ひとつの箱へ。</div>
    <div class="line" data-i="1">組む、たのしみ。</div>
    <div class="line" data-i="2">あなただけの一台に。</div>
  </div>

    <a class="ctabtn main" href="custom.html">この一台に、名前を入れる →</a>
  </div>

  <button id="playBtn" type="button">▶ 組み立てる</button>

</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { LineSegmentsGeometry } from 'three/addons/lines/LineSegmentsGeometry.js';
import { LineSegments2 } from 'three/addons/lines/LineSegments2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

// ---------- options (刻印はデフォルト表示のみ・編集UIなし) ----------
const FONTS=[{n:'明朝',css:'"Shippori Mincho B1", serif'}];
const ENG_COLOR='#9c7846';
const ENGRAVINGS=[
  {id:'main',  match:'大きな', def:'賽銭箱', fill:0.36, weight:700, pscale:1.0},
  {id:'seal1', match:'刻印1',  def:'開',     fill:0.90, weight:700, pscale:1.18},
  {id:'seal2', match:'刻印2',  def:'運',     fill:0.90, weight:700, pscale:1.18}
];
const fontIdx=0;

// ---------- three ----------
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.1,200);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
document.getElementById('app').appendChild(renderer.domElement);
// warm studio backdrop
const bg=(function(){const cv=document.createElement('canvas');cv.width=cv.height=512;const x=cv.getContext('2d');
  const g=x.createRadialGradient(256,170,40,256,300,540);g.addColorStop(0,'#faf5ea');g.addColorStop(0.6,'#ece3d0');g.addColorStop(1,'#ddd1b8');
  x.fillStyle=g;x.fillRect(0,0,512,512);const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;return t;})();
scene.background=bg;
const pmrem=new THREE.PMREMGenerator(renderer); scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;
scene.add(new THREE.HemisphereLight(0xfff4e0,0x6b6250,0.7));
scene.add(new THREE.AmbientLight(0xffffff,0.35));
const key=new THREE.DirectionalLight(0xfff3df,2.5); key.position.set(1.5,6,9); key.castShadow=true;
key.shadow.mapSize.set(2048,2048); key.shadow.camera.near=1; key.shadow.camera.far=40; key.shadow.bias=-0.0004;
key.shadow.camera.left=-8;key.shadow.camera.right=8;key.shadow.camera.top=8;key.shadow.camera.bottom=-8; scene.add(key);
const fillL=new THREE.DirectionalLight(0xffffff,0.45); fillL.position.set(-5,3,5); scene.add(fillL);

// ground shadow
const ground=new THREE.Mesh(new THREE.CircleGeometry(40,48),new THREE.ShadowMaterial({opacity:0.22}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

const holder=new THREE.Group(); scene.add(holder);

// ---------- OrbitControls（カメラは常にユーザー操作に委任・スクリプトによる移動なし） ----------
// 1本指ドラッグ=回転 / ピンチ・ホイール=ズーム / パンは無効
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.enablePan=false;
controls.maxPolarAngle=Math.PI*0.55;
// minDistance/maxDistance と初期位置は、モデル読み込み後に爆発図の広がりから設定する

// ---------- bamboo texture ----------
const texLoader=new THREE.TextureLoader();
function bambooMap(url){ const t=texLoader.load(url); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=8; return t; }
const bambooPhoto=bambooMap('../textures/bamboo.jpg'); bambooPhoto.colorSpace=THREE.SRGBColorSpace;
const bambooNormal=bambooMap('../textures/bamboo_normal.png');
const bambooRough=bambooMap('../textures/bamboo_rough.jpg');
const bambooBump=bambooMap('../textures/bamboo_bump.jpg');
const seamLineMat=new LineMaterial({color:0x5a3d22, transparent:true, opacity:0.55, linewidth:2.4});
seamLineMat.resolution.set(innerWidth, innerHeight);
function addSeamEdges(mesh){
  const eg=new THREE.EdgesGeometry(mesh.geometry, 20);
  const lsg=new LineSegmentsGeometry().setPositions(eg.attributes.position.array);
  const seg=new LineSegments2(lsg, seamLineMat); seg.renderOrder=2; seg.computeLineDistances();
  mesh.add(seg);
}
function triplanarUV(geo, scale){
  const pos=geo.attributes.position, n=pos.count, uv=new Float32Array(n*2);
  const A=new THREE.Vector3(),B=new THREE.Vector3(),C=new THREE.Vector3(),ab=new THREE.Vector3(),ac=new THREE.Vector3(),nr=new THREE.Vector3();
  for(let i=0;i<n;i+=3){ A.fromBufferAttribute(pos,i);B.fromBufferAttribute(pos,i+1);C.fromBufferAttribute(pos,i+2);
    ab.subVectors(B,A);ac.subVectors(C,A);nr.crossVectors(ab,ac);
    const ax=Math.abs(nr.x),ay=Math.abs(nr.y),az=Math.abs(nr.z);
    const V=[A,B,C];
    for(let j=0;j<3;j++){ const v=V[j]; let u,w;
      if(ay>=ax&&ay>=az){ u=v.x; w=v.z; } else if(ax>=az){ u=v.z; w=v.y; } else { u=v.x; w=v.y; }
      uv[(i+j)*2]=u*scale; uv[(i+j)*2+1]=w*scale;
    }
  }
  geo.setAttribute('uv',new THREE.BufferAttribute(uv,2));
}

// ---------- engraving planes ----------
function engLayout(ctx, text, W, H, fill, weight){
  const lines=text.split('\n').slice(0,2);
  const lh=1.22;
  let fs=Math.round(H*fill*(lines.length>1?0.72:1));
  ctx.font=`${weight} ${fs}px ${FONTS[fontIdx].css}`;
  const maxW=W*0.94, maxBlockH=H*0.92;
  const fits=()=>lines.every(l=>ctx.measureText(l).width<=maxW) && fs*lh*lines.length<=maxBlockH;
  while(!fits() && fs>16){ fs-=4; ctx.font=`${weight} ${fs}px ${FONTS[fontIdx].css}`; }
  return {lines, fs, lh, cx:W/2, cy0:H*0.54-(lines.length-1)*fs*lh/2};
}
function makeEngTex(text, aspect, fill, weight){
  fill=fill||0.72; weight=weight||700;
  const W=1024, H=Math.max(64,Math.round(W/Math.max(aspect,0.2)));
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H; const x=cv.getContext('2d');
  x.clearRect(0,0,W,H);
  if(text){ x.textAlign='center'; x.textBaseline='middle';
    const {lines,fs,lh,cx,cy0}=engLayout(x,text,W,H,fill,weight);
    x.shadowColor='rgba(90,60,30,0.25)'; x.shadowBlur=3; x.shadowOffsetY=1;
    x.fillStyle=ENG_COLOR;
    lines.forEach((l,i)=>x.fillText(l,cx,cy0+i*fs*lh));
  }
  const t=new THREE.CanvasTexture(cv); t.colorSpace=THREE.SRGBColorSpace; t.anisotropy=8; return t;
}
function makeEngNormal(text, aspect, fill, weight){
  if(!text) return null;
  fill=fill||0.72; weight=weight||700;
  const NW=512, NH=Math.max(32,Math.round(NW/Math.max(aspect,0.2)));
  const cv=document.createElement('canvas'); cv.width=NW; cv.height=NH; const x=cv.getContext('2d');
  x.fillStyle='#000'; x.fillRect(0,0,NW,NH);
  x.textAlign='center'; x.textBaseline='middle'; x.fillStyle='#fff';
  x.filter='blur(5px)';
  const {lines,fs,lh,cx,cy0}=engLayout(x,text,NW,NH,fill,weight);
  lines.forEach((l,i)=>x.fillText(l,cx,cy0+i*fs*lh));
  x.filter='none';
  const src=x.getImageData(0,0,NW,NH);
  const out=x.createImageData(NW,NH);
  const strength=1.6;
  for(let y=0;y<NH;y++){
    for(let px=0;px<NW;px++){
      const i=(y*NW+px)*4;
      const hL=src.data[(y*NW+Math.max(px-1,0))*4];
      const hR=src.data[(y*NW+Math.min(px+1,NW-1))*4];
      const hU=src.data[(Math.max(y-1,0)*NW+px)*4];
      const hD=src.data[(Math.min(y+1,NH-1)*NW+px)*4];
      let nx=(hL-hR)/255*strength, ny=(hU-hD)/255*strength, nz=1;
      const len=Math.sqrt(nx*nx+ny*ny+nz*nz); nx/=len; ny/=len; nz/=len;
      out.data[i]=Math.round((nx*0.5+0.5)*255); out.data[i+1]=Math.round((ny*0.5+0.5)*255); out.data[i+2]=Math.round((nz*0.5+0.5)*255); out.data[i+3]=255;
    }
  }
  x.putImageData(out,0,0);
  return new THREE.CanvasTexture(cv);
}
function refreshEng(){
  ENGRAVINGS.forEach(e=>{ if(!e.plane) return;
    const m=e.plane.material;
    m.map=makeEngTex(e.def, e.aspect, e.fill, e.weight);
    m.normalMap=makeEngNormal(e.def, e.aspect, e.fill, e.weight);
    m.normalScale.set(0.55,0.55);
    m.needsUpdate=true;
  });
}

// ---------- deterministic pseudo-random (index-seeded) ----------
function hash(i){ const s=Math.sin(i*12.9898+78.233)*43758.5453; return s-Math.floor(s); }
function hashRange(i,salt,min,max){ return min+(hash(i*7.13+salt*3.71)*(max-min)); }

// ---------- assembly state ----------
let modelReady=false;
let parts=[];         // {mesh,homePos,startPos,centerY,start,duration}（向きは変えず位置だけ動かす）
let brownMeshes=[];   // 「茶色」＝レーザー刻印の焼き色表現。爆発対象外・完成間際(p>=0.95)にのみ表示
let modelCenter=new THREE.Vector3();
let modelHeight=1;
let engNodes={}; let engPlanesReady=false;

const easeOutCubic=t=>1-Math.pow(1-t,3);
const clamp01=t=>Math.max(0,Math.min(1,t));

new GLTFLoader().load('models/saisenglb6.glb', gltf=>{
  const root=gltf.scene;
  const boxMat=new THREE.MeshStandardMaterial({map:bambooPhoto, normalMap:bambooNormal, roughnessMap:bambooRough, bumpMap:bambooBump, bumpScale:0.6, color:0xd8b878, roughness:0.62, metalness:0.02, envMapIntensity:0.7});
  const brownMat=new THREE.MeshStandardMaterial({map:bambooPhoto, normalMap:bambooNormal, roughnessMap:bambooRough, bumpMap:bambooBump, bumpScale:0.6, color:0xad8a56, roughness:0.6, metalness:0.03, envMapIntensity:0.6});
  const isBrown=o=>o.name.includes('茶色');   // 焼き色（注連縄・金具）は「茶色」ノードのみ。マテリアル名一致だと本体016(マテリアル.001)まで濃くなるため名前判定に限定
  // 爆発の基準点：常に組み立て済みの位置に固定し、他パーツはここより上へ分解する。
  // GLTFLoaderはノード名の「.」を除去してThree.jsオブジェクト名にする（アニメーションパスの区切り文字と衝突するため）ので、
  // GLB内の実際の名前は「本体.040」だが、ロード後のシーングラフ上では「本体040」になる点に注意
  const ANCHOR_NAME='本体040';
  const bodyMeshes=[];
  let anchorMesh=null;
  root.traverse(o=>{
    if(!o.isMesh) return;
    const eng=ENGRAVINGS.find(e=>o.name.includes(e.match));
    if(eng){ engNodes[eng.id]=o; o.visible=false; return; }
    if(o.name==='文字'){ o.visible=false; return; }
    const brown=isBrown(o);
    o.geometry.computeVertexNormals(); triplanarUV(o.geometry, 1/42);
    o.material=brown?brownMat:boxMat; o.castShadow=true; o.receiveShadow=true;
    // 「茶色」はレーザー刻印の焼き色表現なので独立パーツとして爆発させない。
    // bbox計算(中心合わせ)にはこの時点で可視のまま含め、構図を従来と揃える。
    // 表示制御はapplyProgressで行う（爆発中は非表示→完成間際に「最後に刻印が入る」演出）
    if(brown){ brownMeshes.push(o); return; }
    bodyMeshes.push(o);
    if(o.name===ANCHOR_NAME) anchorMesh=o;
  });
  bodyMeshes.forEach(addSeamEdges);   // traverse完了後に追加（traverse中に子を足すと無限再帰する地雷を回避）
  brownMeshes.forEach(addSeamEdges);  // 茶色にも継ぎ目輪郭（完成時に他パーツと見た目を揃える）
  root.updateMatrixWorld(true);

  // 中心合わせ＆スケール（刻印板を除いた本体のみのbbox）
  const bb=new THREE.Box3(); root.traverse(o=>{ if(o.isMesh && o.visible) bb.expandByObject(o); });
  const size=new THREE.Vector3(), ctr=new THREE.Vector3(); bb.getSize(size); bb.getCenter(ctr);
  const boxGroup=new THREE.Group(); boxGroup.add(root); root.position.set(-ctr.x,-ctr.y,-ctr.z);
  const targetH=2.2, sc=targetH/Math.max(size.y,0.001);
  boxGroup.scale.setScalar(sc); boxGroup.position.y=(size.y*sc)/2;
  holder.add(boxGroup); holder.updateMatrixWorld(true);
  modelHeight=size.y*sc;
  modelCenter.set(0, modelHeight/2, 0);

  // 刻印プレーン：組み上がった状態（爆発オフセット適用前）でのレイキャスト配置
  const rc=new THREE.Raycaster(); rc.camera=camera;
  ENGRAVINGS.forEach(e=>{
    const node=engNodes[e.id]; if(!node) return;
    node.updateWorldMatrix(true,false);
    const wp=new THREE.Vector3(), wq=new THREE.Quaternion(), wsc=new THREE.Vector3();
    node.matrixWorld.decompose(wp,wq,wsc);
    const ps=e.pscale||1;
    const W=Math.max(Math.abs(wsc.x)*2*ps,0.02), H=Math.max(Math.abs(wsc.y)*2*ps,0.02);
    e.aspect=W/H;
    let n=new THREE.Vector3(0,0,1).applyQuaternion(wq); if(n.z<0) n.negate(); n.normalize();
    const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), n);
    rc.set(wp.clone().addScaledVector(n, 0.35), n.clone().negate());
    const hit=rc.intersectObject(boxGroup, true)[0];
    const pos=(hit?hit.point.clone():wp.clone()).addScaledVector(n, 0.003);
    const mat=new THREE.MeshStandardMaterial({transparent:true, alphaTest:0.5, blending:THREE.CustomBlending, blendEquation:THREE.AddEquation, blendSrc:THREE.DstColorFactor, blendDst:THREE.OneMinusSrcAlphaFactor, roughness:0.55, metalness:0, depthWrite:false, polygonOffset:true, polygonOffsetFactor:-2, polygonOffsetUnits:-2});
    const plane=new THREE.Mesh(new THREE.PlaneGeometry(W,H), mat);
    plane.quaternion.copy(q);
    plane.position.copy(pos);
    plane.renderOrder=3; plane.visible=false;
    holder.add(plane); e.plane=plane;
  });
  refreshEng(); engPlanesReady=true;

  // ---------- パーツごとの爆発初期値・組み立て順を計算 ----------
  // 注意：mesh.position はroot直下のローカル座標（rootはboxGroup内でsc倍される）。
  // 爆発オフセットはワールド寸法(modelHeight基準)で決めるため、ローカルに足す際は 1/sc して
  // 「ワールドで見て正しい距離」になるよう補正する（そのままだと二重にスケールされ、ほぼ動いて見えなくなる）。
  //
  // 基準点(ANCHOR_NAME=本体.040)は爆発時も一切動かさない完全固定アンカー。
  // 他の全パーツは「アンカーのY位置からどれだけ上にあるか」に応じて上方向へオフセットする
  // （アンカーより低いパーツがあっても下には落とさず、アンカーの最下点を新しい床としてクランプする）。
  const N=bodyMeshes.length;
  // 前方(+Z・カメラ側)へ引き出して見せるパーツ（saisenglb6固有のノード名。GLTFは「.」を除去するので本体.004→本体004）
  const FRONT_PARTS=['本体004','本体041'];   // 本体004＝額(名入れプレート)、本体041＝しめ縄
  const GOLDEN_ANGLE=Math.PI*(3-Math.sqrt(5));   // 黄金角。フィボナッチ螺旋でパーツを均等に分散させる
  const tmpBB=new THREE.Box3();
  if(!anchorMesh) console.warn('assembly: anchor mesh', ANCHOR_NAME, 'not found — falling back to no anchor bias');
  let anchorCenterY=modelCenter.y, anchorBottomY=0;
  if(anchorMesh){
    if(!anchorMesh.geometry.boundingBox) anchorMesh.geometry.computeBoundingBox();
    const aBB=new THREE.Box3().copy(anchorMesh.geometry.boundingBox).applyMatrix4(anchorMesh.matrixWorld);
    const aCenter=new THREE.Vector3(); aBB.getCenter(aCenter);
    anchorCenterY=aCenter.y; anchorBottomY=aBB.min.y;
  }
  let idx=0;
  const rawParts=bodyMeshes.map((mesh)=>{
    const isAnchor=(mesh===anchorMesh);
    // mesh.geometry のみからbboxを取る（setFromObjectだと継ぎ目輪郭のLineSegments2子要素を
    // 巻き込んで異常に大きい/おかしなbboxになることがあるため、ジオメトリ単体→matrixWorldで変換）
    if(!mesh.geometry.boundingBox) mesh.geometry.computeBoundingBox();
    tmpBB.copy(mesh.geometry.boundingBox).applyMatrix4(mesh.matrixWorld);
    const partCenterWorld=new THREE.Vector3(); tmpBB.getCenter(partCenterWorld);

    if(isAnchor){
      // 基準点：爆発時も常に組み立て済みの位置のまま（オフセットなし）
      return { mesh, homePos: mesh.position.clone(), startPos: mesh.position.clone(), centerY: partCenterWorld.y, az:0, isAnchor:true };
    }

    const partSize=new THREE.Vector3(); tmpBB.getSize(partSize);
    const partBottomY=tmpBB.min.y;                       // 組み立て時のこのパーツの最下点（ワールドY）
    const partRadius=partSize.length()*0.5;              // パーツ自身の概算半径（大きいパーツほど遠くへ）

    const aboveAnchor=Math.max(0, partCenterWorld.y-anchorCenterY);   // アンカーより上にある高さ（下にあれば0扱い）
    let dir, az, dist;
    if(FRONT_PARTS.includes(mesh.name)){
      // 前方分解パーツ（saisenglb6固有）：額＝名入れプレート(本体004)・しめ縄(本体041)。
      // 鳥居は箱より奥(-Z)にあり放射方向だと後方へ飛んでカメラから隠れるため、
      // これらの「見せたい前面パーツ」は前方(+Z・カメラ側)へ少し上向きに引き出す。中央にあるので左右対称は保たれる。
      dir=new THREE.Vector3(0, 0.35, 1).normalize();
      az=Math.PI/2;                                     // ソート用（前方向き）
      dist=modelHeight*0.5 + partRadius*0.9;            // 手前にはっきり引き出す（高さ差は使わず控えめに）
    }else{
      // ---- 左右対称な爆発方向 ----
      // 各パーツを「モデル中心の縦軸から自分の水平位置への方向」へ押し出す。
      // 商品は左右対称なので、+X のパーツは右へ・その鏡像(-X)は左へと自然に対称に散る。
      // 方向も距離も対称量（位置・高さ・大きさ）だけで決め、hash等の非対称な乱数は使わない。
      const hx=partCenterWorld.x-modelCenter.x;
      const hz=partCenterWorld.z-modelCenter.z;
      const horiz=new THREE.Vector3(hx,0,hz);
      const hlen=horiz.length();
      if(hlen>1e-3) horiz.multiplyScalar(1/hlen); else horiz.set(0,0,1);   // 中心軸上のパーツは前方(+Z)へ（対称を崩さない）
      // 高いパーツほど上向き成分を強める（Y依存＝左右対称）
      const heightT=clamp01((partCenterWorld.y-anchorBottomY)/Math.max(1e-3,modelHeight));   // 0(下)〜1(上)
      const yBias=0.42+heightT*0.48;                       // Y成分の比率(0.42〜0.90・常に正＝上向き優先)
      const horizW=Math.sqrt(Math.max(0,1-yBias*yBias));    // 単位ベクトルになるよう水平成分を正規化
      dir=new THREE.Vector3(horiz.x*horizW, yBias, horiz.z*horizW).normalize();
      az=Math.atan2(horiz.z,horiz.x);                       // 組み立て順の水平分散ソート用（方向から算出）
      // ---- 爆発距離（対称量のみ・以前より寄せる）----
      // アンカーからの高さ差＋パーツの大きさでスケール（大きい・高いパーツほど離して重なり低減）。
      dist=modelHeight*0.26 + aboveAnchor*0.7 + partRadius*0.95;
    }
    const explodedOffsetWorld=dir.multiplyScalar(dist);

    // アンカー最下点(=新しい床)より下に絶対に行かないようクランプ。
    // 「このパーツの最下点+オフセットのY」がアンカー最下点を下回るなら、その分だけ持ち上げる
    const explodedBottomY=partBottomY+explodedOffsetWorld.y;
    if(explodedBottomY<anchorBottomY){ explodedOffsetWorld.y+=(anchorBottomY-explodedBottomY); }

    const explodedOffsetLocal=explodedOffsetWorld.clone().divideScalar(sc);   // ローカル座標に変換（boxGroupのスケールを打ち消す）
    // 回転は与えない：パーツは組み立て時と同じ向きのまま、位置だけ離す
    return {
      mesh,
      homePos: mesh.position.clone(),          // 元の(=組み上がった)位置：ローカルではほぼ(0,0,0)
      startPos: mesh.position.clone().add(explodedOffsetLocal),
      centerY: partCenterWorld.y,
      az                                        // 方位角（組み立て順の水平分散に利用）
    };
  });
  // 組み立て順：重心Yの昇順（下の土台から上の鳥居・注連縄へ）を基本に、
  // 同程度の高さのパーツ同士は方位角(az)でも分散させ、出発点→到達点の経路が
  // 他パーツの最終位置と重なりにくいようにする（Yを主キー・粗いバケツ、azを副キーでソート）
  const Y_BUCKET=modelHeight*0.12;
  rawParts.sort((a,b)=>{
    const ba=Math.floor(a.centerY/Y_BUCKET), bb=Math.floor(b.centerY/Y_BUCKET);
    if(ba!==bb) return ba-bb;
    return a.az-b.az;
  });
  // 各パーツのアニメ窓を [0,1] 内に収める：最後(最上部)のパーツが start+duration>1 になると
  // p=1でも組み上がりきらず浮いて見える（特に本体010＝笠木は爆発オフセット最大なので顕著）。
  // start を (i/(N-1))*(1-duration) にして、i=0は[0,dur]、i=N-1はちょうど[1-dur,1]で完了させる。
  const DUR=0.25;
  rawParts.forEach((p,i)=>{
    p.start = N<=1 ? 0 : (i/(N-1))*(1-DUR);
    p.duration=DUR;
  });
  parts=rawParts;

  // 初期状態を爆発図に反映
  applyProgress(0);

  // カメラ初期位置：爆発図全体が収まる引き（以降のカメラ移動はOrbitControlsのユーザー操作のみ）
  // 縦長（スマホ）は水平FOVが狭いぶん追加で引く
  const aspectComp=camera.aspect<1?Math.min(1/camera.aspect,1.8):1;
  const initDist=modelHeight*10.5*aspectComp;
  const az0=THREE.MathUtils.degToRad(-25);
  camera.position.set(Math.sin(az0)*initDist, modelHeight*0.55, Math.cos(az0)*initDist);
  controls.target.set(0, modelHeight*0.42, 0);
  controls.minDistance=modelHeight*1.3;      // ディテール確認まで寄れる
  controls.maxDistance=initDist*1.25;        // 爆発図全体＋余白まで引ける
  controls.update();

  document.getElementById('loader').style.display='none';
  document.getElementById('playWrap').classList.add('show');
  updatePlayBtn();
  modelReady=true;
}, ev=>{ if(ev.lengthComputable) document.getElementById('lt').textContent='竹を削り出しています… '+Math.round(ev.loaded/ev.total*100)+'%'; },
  err=>{ document.getElementById('lt').textContent='読み込みに失敗しました'; console.error(err); });

// ---------- progress -> pose ----------
function applyProgress(p){
  parts.forEach(part=>{
    const t=clamp01((p-part.start)/part.duration);
    const e=easeOutCubic(t);
    part.mesh.position.lerpVectors(part.startPos, part.homePos, e);   // 向きは常に組み立て時のまま（回転は与えない）
  });
  // 完成演出：p>=0.95で刻印プレーンと「茶色」(焼き色表現)を表示
  // 茶色は爆発対象外（常に最終位置）。爆発中に焼き色だけ宙に浮くと不自然なので隠し、
  // 完成間際に「最後にレーザー刻印が入る」仕上げとして現す
  const done=p>=0.95;
  ENGRAVINGS.forEach(e=>{ if(e.plane) e.plane.visible=done; });
  brownMeshes.forEach(m=>{ m.visible=done; });
}

// ---------- caption ----------
const captionLines=[...document.querySelectorAll('#caption .line')];
const ctaWrap=document.getElementById('ctaWrap');
let curCaption=-1;
function applyCaption(p){
  let idx;
  if(p<0.33) idx=0; else if(p<0.85) idx=1; else idx=2;
  if(idx!==curCaption){
    captionLines.forEach((el,i)=>el.classList.toggle('on', i===idx));
    curCaption=idx;
  }
  ctaWrap.classList.toggle('show', p>=0.95);
}

// ---------- button-driven progress（スクロール駆動は廃止） ----------
let progress=0;
const PLAY_DUR=7000;   // 進捗0→1のフル再生時間(ms)。分解(逆再生)も同じ速度
const easeInOutCubic=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
let playing=false, playFrom=0, playTarget=0, playT0=0, playDurEff=PLAY_DUR;
const playBtn=document.getElementById('playBtn');
function updatePlayBtn(){
  if(playing){ playBtn.disabled=true; playBtn.textContent=playTarget>playFrom?'組み立て中…':'分解中…'; }
  else{ playBtn.disabled=false; playBtn.textContent=progress>=0.999?'⟲ 分解する':'▶ 組み立てる'; }
}
function startPlay(target){
  if(playing) return;
  playing=true; playFrom=progress; playTarget=target; playT0=performance.now();
  playDurEff=Math.max(1, PLAY_DUR*Math.abs(target-playFrom));   // 途中からでも進行速度が一定になるよう距離比で短縮
  updatePlayBtn();
}
playBtn.addEventListener('click', ()=>{ startPlay(progress>=0.999?0:1); });
function tickPlay(now){
  if(!playing) return;
  const t=clamp01((now-playT0)/playDurEff);
  progress=playFrom+(playTarget-playFrom)*easeInOutCubic(t);
  if(t>=1){ progress=playTarget; playing=false; updatePlayBtn(); }
  document.getElementById('rail').style.width=(progress*100)+'%';
}

// ---------- loop ----------
function animate(){ requestAnimationFrame(animate);
  tickPlay(performance.now());
  if(modelReady){
    applyProgress(progress);
    applyCaption(progress);
  }
  controls.update();
  renderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);seamLineMat.resolution.set(innerWidth,innerHeight);});
</script>
